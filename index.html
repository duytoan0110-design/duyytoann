<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duy Toàn | Digital Profile</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #0f0f0f;
            --primary-color: #00d4ff; /* Cyan Neon */
            --secondary-color: #0072ff; /* Blue */
            --text-main: #ffffff;
            --text-dim: #999999;
            --glow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Hiệu ứng hạt bụi mờ phía sau */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #0a1520 0%, #050505 100%);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 24px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            position: relative;
            overflow: hidden;
        }

        /* Đường kẻ neon chạy dọc viền */
        .profile-card::after {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
            animation: scanline 4s linear infinite;
        }

        @keyframes scanline {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .avatar {
            width: 90px;
            height: 90px;
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid var(--primary-color);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            color: var(--primary-color);
            box-shadow: var(--glow);
            text-shadow: var(--glow);
        }

        h1 {
            font-size: 26px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 13px;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 35px;
            opacity: 0.8;
        }

        .section-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-align: left;
            margin: 25px 0 10px 5px;
            display: block;
        }

        .link-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-link {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            transition: 0.3s;
        }

        .btn-link:hover {
            background: rgba(0, 212, 255, 0.08);
            border-color: var(--primary-color);
            transform: scale(1.02);
        }

        .btn-link .label { font-weight: 600; font-size: 14px; }
        .btn-link .value { color: var(--primary-color); font-size: 13px; font-family: monospace; }

        .services-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .service-item {
            background: rgba(0, 114, 255, 0.05);
            border: 1px solid rgba(0, 114, 255, 0.15);
            padding: 10px;
            border-radius: 8px;
            font-size: 11px;
            color: #ccc;
        }

        .bank-card {
            background: linear-gradient(135deg, #111, #000);
            border: 1px solid #222;
            padding: 20px;
            border-radius: 16px;
            text-align: left;
            margin-top: 5px;
            border-left: 3px solid var(--primary-color);
        }

        .bank-card div { margin-bottom: 5px; font-size: 12px; color: var(--text-dim); }
        .bank-card strong { color: var(--text-main); font-size: 14px; display: block; margin-top: 2px; }

        footer {
            margin-top: 30px;
            font-size: 10px;
            color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
